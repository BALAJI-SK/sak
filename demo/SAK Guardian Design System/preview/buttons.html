<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg);color:var(--fg)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;height:36px;padding:0 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--fg);font-family:var(--font-sans);font-size:13.5px;font-weight:500;cursor:pointer;transition:border-color .2s,background .2s}
.btn:hover{border-color:var(--sak-border-2);background:#181822}
.btn--primary{background:var(--sak-green);color:#001a0e;border-color:var(--sak-green);font-weight:600}
.btn--primary:hover{background:#33ffa1}
.btn--danger{border-color:var(--sak-red);color:var(--sak-red);background:rgba(255,51,102,0.06)}
.btn--danger:hover{background:rgba(255,51,102,0.14)}
.btn--success{border-color:var(--sak-green);color:var(--sak-green);background:rgba(0,255,136,0.06)}
.star{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--fg-2);cursor:pointer;font-size:12px}
.star:hover{color:var(--sak-yellow);border-color:var(--sak-yellow)}
.star.on{color:var(--sak-yellow);border-color:var(--sak-yellow);background:rgba(255,215,0,0.08)}
</style></head><body>
<div class="row" style="margin-bottom:14px">
  <button class="btn btn--primary">Ship it</button>
  <button class="btn">Default</button>
  <button class="btn btn--success">✓ Correct</button>
  <button class="btn btn--danger">✗ Wrong</button>
</div>
<div class="row">
  <button class="star on">1★</button>
  <button class="star on">2★</button>
  <button class="star on">3★</button>
  <button class="star">4★</button>
  <button class="star">5★</button>
</div>
</body></html>
