<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg);color:var(--fg);font-family:var(--font-mono)}
.row{display:flex;gap:18px;flex-wrap:wrap}
.t{display:flex;flex-direction:column;align-items:flex-start;gap:6px}
.b{background:var(--surface);border:1px solid var(--border)}
.l{font-size:10.5px;color:var(--fg-2)}
</style></head><body>
<div class="row">
  <div class="t"><div class="b" style="width:24px;height:24px;border-radius:4px"></div><span class="l">4 · chip</span></div>
  <div class="t"><div class="b" style="width:40px;height:40px;border-radius:8px"></div><span class="l">8 · button</span></div>
  <div class="t"><div class="b" style="width:64px;height:64px;border-radius:12px"></div><span class="l">12 · card</span></div>
  <div class="t"><div class="b" style="width:80px;height:80px;border-radius:16px"></div><span class="l">16 · tile</span></div>
  <div class="t"><div class="b" style="width:80px;height:32px;border-radius:999px"></div><span class="l">999 · pill</span></div>
</div>
</body></html>
