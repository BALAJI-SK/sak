<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg)}
.row{display:flex;gap:12px;flex-wrap:wrap}
.sw{flex:1;min-width:140px;height:88px;border-radius:var(--r-lg);border:1px solid var(--border);padding:12px;display:flex;flex-direction:column;justify-content:space-between;font-family:var(--font-mono);font-size:11px;color:var(--fg-2)}
.sw b{color:var(--fg);font-weight:600;font-family:var(--font-sans);font-size:13px}
.sw code{color:var(--fg-2);font-size:10.5px}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#0a0a0f"><b style="color:#fff">bg</b><code>#0a0a0f</code></div>
  <div class="sw" style="background:#12121a"><b style="color:#fff">surface</b><code>#12121a</code></div>
  <div class="sw" style="background:#1e1e2e"><b style="color:#fff">border</b><code>#1e1e2e</code></div>
  <div class="sw" style="background:#181822"><b style="color:#fff">surface-2</b><code>#181822</code></div>
</div>
</body></html>
