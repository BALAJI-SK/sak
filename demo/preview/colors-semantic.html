<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg)}
.row{display:flex;gap:12px;flex-wrap:wrap}
.sw{flex:1;min-width:120px;height:96px;border-radius:var(--r-lg);border:1px solid var(--border);padding:12px;display:flex;flex-direction:column;justify-content:space-between;font-family:var(--font-mono);font-size:11px}
.sw b{font-weight:600;font-family:var(--font-sans);font-size:13px}
.sw code{font-size:10.5px;opacity:0.7}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#0a0a0f;border-color:rgba(0,255,136,0.4);color:#00ff88"><b>green / allowed</b><code>#00ff88</code></div>
  <div class="sw" style="background:#0a0a0f;border-color:rgba(255,51,102,0.4);color:#ff3366"><b>red / blocked</b><code>#ff3366</code></div>
  <div class="sw" style="background:#0a0a0f;border-color:rgba(255,153,0,0.4);color:#ff9900"><b>orange / warn</b><code>#ff9900</code></div>
  <div class="sw" style="background:#0a0a0f;border-color:rgba(124,58,237,0.4);color:#7c3aed"><b>purple / accent</b><code>#7c3aed</code></div>
</div>
</body></html>
