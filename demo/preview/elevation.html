<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:32px;background:var(--bg);color:var(--fg);font-family:var(--font-mono);font-size:11px;color:var(--fg-2)}
.row{display:flex;gap:32px;align-items:flex-end}
.t{display:flex;flex-direction:column;align-items:center;gap:10px}
.b{width:88px;height:60px;background:var(--surface);border:1px solid var(--border);border-radius:12px}
.b1{box-shadow:0 0 24px -4px rgba(255,51,102,0.5);border-color:rgba(255,51,102,0.4)}
.b2{box-shadow:0 0 24px -4px rgba(0,255,136,0.5);border-color:rgba(0,255,136,0.4)}
.b3{box-shadow:0 0 32px -4px rgba(124,58,237,0.45);border-color:rgba(124,58,237,0.4)}
</style></head><body>
<div class="row">
  <div class="t"><div class="b"></div><span>default</span></div>
  <div class="t"><div class="b b1"></div><span>glow-red</span></div>
  <div class="t"><div class="b b2"></div><span>glow-green</span></div>
  <div class="t"><div class="b b3"></div><span>glow-purple</span></div>
</div>
</body></html>
