<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg);color:var(--fg)}
.row{display:flex;gap:12px}
.tile{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative;overflow:hidden}
.lbl{display:flex;align-items:center;gap:8px;color:var(--fg-2);font-size:11.5px;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.val{font-family:var(--font-mono);font-size:30px;font-weight:700;color:var(--fg);line-height:1}
.sub{font-size:11px;color:var(--fg-2);margin-top:6px}
.bloom{position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;filter:blur(40px);opacity:0.15}
</style></head><body>
<div class="row">
  <div class="tile"><div class="bloom" style="background:#00ff88"></div><div class="lbl"><span class="sak-dot"></span>Allowed</div><div class="val" style="color:#00ff88">14</div><div class="sub">Transactions approved</div></div>
  <div class="tile"><div class="bloom" style="background:#ff3366"></div><div class="lbl"><span class="sak-dot" style="background:#ff3366;box-shadow:0 0 8px #ff3366"></span>Blocked</div><div class="val" style="color:#ff3366">46</div><div class="sub">Threats prevented</div></div>
  <div class="tile"><div class="bloom" style="background:#7c3aed"></div><div class="lbl">⚡ Avg</div><div class="val" style="color:#fff">43<span style="font-size:14px;color:var(--fg-2)">ms</span></div><div class="sub">Simulation latency</div></div>
</div>
</body></html>
