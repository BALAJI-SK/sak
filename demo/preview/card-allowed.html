<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg);color:var(--fg)}
.card{background:var(--surface);border:1px solid rgba(0,255,136,0.4);border-radius:12px;padding:16px;max-width:640px;box-shadow:0 0 24px -8px rgba(0,255,136,0.35)}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.title{font-weight:600;font-size:16px}
.meta{margin-left:auto;font-family:var(--font-mono);font-size:12px;color:var(--fg-2)}
.body{color:var(--fg-2);font-size:14px;margin-bottom:8px}
.ok{font-family:var(--font-mono);font-size:12.5px;color:var(--sak-green)}
.ms{color:var(--sak-green)}
</style></head><body>
<div class="card">
  <div class="hdr">
    <span class="sak-pill sak-pill--allowed">● Allowed</span>
    <span class="title">Valid USDC Transfer</span>
    <span class="meta">16:21:52 · <span class="ms">38ms</span></span>
  </div>
  <div class="body">Transfer 0.5 SOL to verified wallet.</div>
  <div class="ok">All 7 rules passed ✓</div>
  <div class="ok" style="color:var(--fg-2)">Simulation matched expected output.</div>
</div>
</body></html>
