<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg);color:var(--fg)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;max-width:640px}
.card.blocked{border-color:rgba(255,51,102,0.4);box-shadow:0 0 24px -8px rgba(255,51,102,0.4)}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.title{font-weight:600;font-size:16px}
.meta{margin-left:auto;font-family:var(--font-mono);font-size:12px;color:var(--fg-2)}
.body{color:var(--fg-2);font-size:14px;margin-bottom:8px}
.rule{font-family:var(--font-mono);font-size:12.5px;color:var(--sak-yellow);margin-bottom:2px}
.reason{font-family:var(--font-mono);font-size:12.5px;color:var(--fg-2)}
.loss{color:var(--sak-green);font-family:var(--font-mono);font-size:13px;margin-top:8px;font-weight:600}
.ms{color:var(--sak-green)}
</style></head><body>
<div class="card blocked">
  <div class="hdr">
    <span class="sak-pill sak-pill--blocked">● Blocked</span>
    <span class="title">99% Slippage Swap</span>
    <span class="sak-pill sak-pill--critical">Critical</span>
    <span class="meta">16:21:55 · <span class="ms">43ms</span></span>
  </div>
  <div class="body">Agent tried to swap 100 USDC with 99% slippage.</div>
  <div class="rule">Rule fired: max_slippage</div>
  <div class="reason">Reason: 9900bps exceeds maximum 200bps</div>
  <div class="loss">Prevented loss: ~$498.50</div>
</div>
</body></html>
